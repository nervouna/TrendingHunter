sources:
  github:
    enabled: true
    languages: []
    since: "daily"
    token: "${TH_GITHUB_TOKEN}"

signal_gate:
  min_star_velocity: 10.0
  max_repo_age_days: 365
  min_first_time_contributors: 0

llm:
  draft:
    base_url: "${TH_DRAFT_BASE_URL}"
    api_key: "${TH_DRAFT_API_KEY}"
    model: "MiniMax-M2.7-highspeed"
    max_tokens: 4096
  audit:
    base_url: "${TH_AUDIT_BASE_URL}"
    api_key: "${TH_AUDIT_API_KEY}"
    model: "deepseek-reasoner"
    max_tokens: 4096
  rewrite:
    base_url: "${TH_DRAFT_BASE_URL}"
    api_key: "${TH_DRAFT_API_KEY}"
    model: "MiniMax-M2.7-highspeed"
    max_tokens: 4096

tavily:
  api_key: "${TH_TAVILY_API_KEY}"

knowledge_base:
  path: "./reports"
